<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon Chatbot IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #07080f;
      --surface: #0f1018;
      --card:    #13141f;
      --border:  #1e2035;
      --text:    #e2e4f0;
      --muted:   #565870;
      --accent:  #4f8ef7;
      --accent2: #a78bfa;
      --green:   #34d399;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(79,142,247,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 700px;
    }

    /* Header */
    header {
      display: flex; align-items: center;
      gap: 1rem; margin-bottom: 2rem;
    }

    .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.4rem;
      letter-spacing: -0.03em;
    }

    header p {
      font-size: 0.68rem; color: var(--muted);
      margin-top: 2px;
    }

    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.65rem; color: var(--green);
      border: 1px solid rgba(52,211,153,0.2);
      padding: 5px 12px; border-radius: 20px;
      background: rgba(52,211,153,0.05);
    }

    .status-dot::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.4); }
      50%      { box-shadow: 0 0 0 5px rgba(52,211,153,0); }
    }

    /* System prompt */
    .config-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
    }

    .config-block label {
      display: block;
      font-size: 0.6rem; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--accent2);
      margin-bottom: 0.5rem;
    }

    .config-block textarea {
      width: 100%; background: transparent;
      border: none; outline: none;
      color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 0.76rem; resize: vertical;
      min-height: 50px; line-height: 1.6;
    }

    /* Stats */
    .stats {
      display: flex; gap: 1.5rem; align-items: center;
      padding: 0.5rem 0.2rem;
      font-size: 0.62rem; color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .stats strong { color: var(--text); }

    .clear-btn {
      margin-left: auto;
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 0.62rem; padding: 3px 10px;
      border-radius: 6px; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .clear-btn:hover { color: #f87171; border-color: rgba(248,113,113,0.3); }

    /* Messages */
    .messages {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      min-height: 380px; max-height: 520px;
      overflow-y: auto;
      padding: 1.4rem;
      margin-bottom: 1rem;
      display: flex; flex-direction: column; gap: 1.2rem;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.75rem; color: var(--muted);
      opacity: 0.45; text-align: center;
    }
    .empty-state .icon { font-size: 2.2rem; }
    .empty-state p { font-size: 0.73rem; line-height: 1.7; }

    .msg { display: flex; gap: 0.75rem; animation: rise 0.25s ease; }
    .msg.user { flex-direction: row-reverse; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 600;
    }

    .msg.ai .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }

    .msg.user .avatar {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .bubble {
      max-width: 80%;
      padding: 0.8rem 1.1rem;
      border-radius: 12px;
      font-size: 0.83rem;
      line-height: 1.75;
    }

    .msg.ai .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-left-radius: 3px;
    }

    .msg.user .bubble {
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.2);
      border-top-right-radius: 3px;
      color: #c8d8ff;
    }

    .streaming::after {
      content: '▌';
      color: var(--accent);
      animation: blink 0.6s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0; }
    }

    /* Input */
    .input-row {
      display: flex; gap: 0.75rem; align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1.1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.08);
    }

    .input-wrap textarea {
      width: 100%; background: transparent;
      border: none; outline: none;
      color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 0.83rem; resize: none;
      min-height: 22px; max-height: 120px; line-height: 1.5;
    }

    .input-wrap textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 46px; height: 46px;
      border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--accent), #3b6fd4);
      color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(79,142,247,0.25);
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      opacity: 0.9; transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79,142,247,0.35);
    }

    .send-btn:active:not(:disabled) { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { width: 17px; height: 17px; }

    .footer {
      margin-top: 1.5rem; text-align: center;
      font-size: 0.62rem; color: var(--muted); opacity: 0.6;
    }

    .footer span { color: var(--accent); }

    .error-bar {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 8px; padding: 0.7rem 1rem;
      font-size: 0.73rem; color: #fca5a5;
      margin-top: 0.5rem; display: none;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">✦</div>
    <div>
      <h1>Mon Chatbot IA</h1>
      <p>Propulsé par Groq · Llama 3.3 70B</p>
    </div>
    <div class="status-dot">EN LIGNE</div>
  </header>

  <!-- System prompt configurable -->
  <div class="config-block">
    <label>⚙ Personnalité du bot</label>
    <textarea id="systemPrompt">Tu es un assistant IA utile, concis et sympathique. Tu réponds toujours en français.</textarea>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div>Messages : <strong id="statMsgs">0</strong></div>
    <div>Modèle : <strong>llama-3.3-70b</strong></div>
    <button class="clear-btn" onclick="clearChat()">✕ Effacer</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="icon">✦</div>
      <p>Ton chatbot est prêt.<br/>Envoie un message pour commencer.</p>
    </div>
  </div>

  <div class="error-bar" id="errorBar"></div>

  <!-- Input -->
  <div class="input-row">
    <div class="input-wrap">
      <textarea
        id="userInput"
        placeholder="Écris ton message… (Entrée pour envoyer)"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div class="footer">
    Backend : <span>/api/chat</span> · Vercel Functions · Groq API gratuite
  </div>
</div>

<script>
  const history = [];

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function clearChat() {
    history.length = 0;
    document.getElementById('messages').innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="icon">✦</div>
        <p>Ton chatbot est prêt.<br/>Envoie un message pour commencer.</p>
      </div>`;
    document.getElementById('statMsgs').textContent = '0';
  }

  function addMessage(role, text) {
    const container = document.getElementById('messages');
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br/>');

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
    return bubble;
  }

  function showError(msg) {
    const el = document.getElementById('errorBar');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 6000);
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    const aiBubble = addMessage('ai', '');
    aiBubble.classList.add('streaming');

    try {
      const system = document.getElementById('systemPrompt').value.trim();

      // Appel vers TON backend Vercel — pas directement vers Groq
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, system })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || `Erreur ${response.status}`);
      }

      const reply = data.choices?.[0]?.message?.content || '';
      aiBubble.classList.remove('streaming');
      aiBubble.innerHTML = reply.replace(/\n/g, '<br/>');
      history.push({ role: 'assistant', content: reply });

      document.getElementById('statMsgs').textContent =
        history.filter(m => m.role === 'user').length;

      document.getElementById('messages').scrollTop = 99999;

    } catch (err) {
      aiBubble.classList.remove('streaming');
      aiBubble.innerHTML = '<em style="color:#f87171">Erreur de réponse.</em>';
      showError(err.message);
      history.pop();
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
